name: CI

on:
  push:
    branches: [main, "member/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Lint
        run: ruff check src/ tests/ scripts/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -k "not slow and not integration"

  check-contributors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commit distribution
        run: |
          echo "=== Contributors ==="
          git shortlog -sn --all --no-merges
          UNIQUE=$(git log --format='%ae' --no-merges | sort -u | wc -l)
          echo "Unique authors: $UNIQUE"
          if [ "$UNIQUE" -lt 3 ]; then
            echo "::warning::Less than 3 unique authors detected"
          fi
